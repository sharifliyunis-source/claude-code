# Fallback cache refresher for Middle Corridor News.
# Vercel's cron (middle-corridor-news/vercel.json) is the primary trigger;
# this workflow is a backup that hits the same endpoint every 2 hours.
# Configure two repository secrets after deploying to Vercel:
#   MCN_SITE_URL    e.g. https://middle-corridor-news.vercel.app
#   MCN_CRON_SECRET same value as the CRON_SECRET env var on Vercel
name: Refresh Middle Corridor News

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/refresh
        env:
          SITE_URL: ${{ secrets.MCN_SITE_URL }}
          CRON_SECRET: ${{ secrets.MCN_CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "MCN_SITE_URL secret not set — skipping."
            exit 0
          fi
          curl -fsS --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/refresh"
